<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MetaFit</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>🏋️ MetaFit</h1>

</header>

<div class="container">

<div id="home">

<h2>Bienvenido</h2>

<button onclick="showSection('register')">📝 Crear cuenta</button>

<button onclick="showSection('login')">🔐 Iniciar sesión</button>

</div>

<div id="register" class="hidden">

<h2>Registro</h2>

<input id="regName" placeholder="Nombre completo">
<input id="regEmail" placeholder="Correo">
<input id="regPass" type="password" placeholder="Contraseña">
<input id="regAge" placeholder="Edad">
<input id="regWeight" placeholder="Peso (kg)">
<input id="regHeight" placeholder="Altura (cm)">

<select id="regSex">
<option>Masculino</option>
<option>Femenino</option>
</select>

<button onclick="register()">Registrarse</button>

<button onclick="showSection('home')">⬅ Volver</button>

</div>

<div id="login" class="hidden">

<h2>Iniciar sesión</h2>

<input id="logEmail" placeholder="Correo">
<input id="logPass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<button onclick="showSection('home')">⬅ Volver</button>

</div>

<div id="dashboard" class="hidden">

<h2>Panel MetaFit</h2>

<p id="imc"></p>

<div class="menu">

<div class="card" onclick="openRutina()">💪 Rutina</div>

<div class="card" onclick="openDieta()">🥗 Plan Alimenticio</div>

<div class="card" onclick="showSection('patologias')">🩺 Patologías</div>

<div class="card" onclick="openPrevencion()">⚠ Prevención</div>

<div class="card" onclick="openCalendario()">📅 Calendario</div>

<div class="card" onclick="editarCuenta()">⚙ Editar Cuenta</div>

<div class="card" onclick="openProgreso()">📊 Progreso</div>

</div>

</div>

<div id="patologias" class="hidden">

<h2>🩺 Patologías</h2>

<input id="lesion" placeholder="Lesiones">
<input id="enfermedad" placeholder="Enfermedades">
<input id="cirugia" placeholder="Cirugías previas">

<button onclick="guardarSalud()">Guardar</button>

<button onclick="showSection('dashboard')">⬅ Volver</button>

</div>

<div id="rutina" class="hidden"></div>

<div id="dieta" class="hidden"></div>

<div id="prevencion" class="hidden"></div>

<div id="calendario" class="hidden"></div>

<div id="editarCuenta" class="hidden"></div>

<div id="progreso" class="hidden"></div>

</div>

<script src="app.js"></script>

</body>

</html>
